# SnortForge - app + PostgreSQL.
#
# Credentials come from the environment (a local .env file), not from this
# tracked file. Copy .env.example to .env once; `docker compose up` reads it
# automatically. SNORTFORGE_DB_URL is assembled from the same vars, so the
# repository layer selects PostgreSQL with zero hand-configuration.
#
# Usage:
#   copy .env.example .env      (Windows)   /   cp .env.example .env  (Linux/mac)
#   docker compose up --build
#   open http://localhost:8501
#
# For the default SQLite backend instead, run the plain image:
#   docker run -p 8501:8501 snortforge

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - snortforge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      SNORTFORGE_DB_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy

volumes:
  snortforge_pgdata:
